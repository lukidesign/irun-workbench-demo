<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>iRun · 数字运维工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg-0:#04060d;
  --bg-1:#070b16;
  --bg-2:#0b1222;
  --panel:rgba(10,16,30,0.72);
  --panel-2:rgba(15,22,40,0.86);
  --line:rgba(120,160,220,0.14);
  --line-2:rgba(120,160,220,0.28);
  --text:#dbe5f4;
  --text-dim:#8a99b6;
  --text-mute:#5a6a87;
  --cyan:#22d3ee;
  --cyan-soft:rgba(34,211,238,0.14);
  --amber:#fbbf24;
  --violet:#a78bfa;
  --emerald:#34d399;
  --rose:#f87171;
  --grid-major:rgba(80,140,200,0.07);
  --grid-minor:rgba(80,140,200,0.035);
  --font-display:"Space Grotesk", "Noto Sans SC", sans-serif;
  --font-body:"Noto Sans SC", "Space Grotesk", sans-serif;
  --font-mono:"JetBrains Mono", ui-monospace, monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%}
body{
  background:var(--bg-0);
  color:var(--text);
  font-family:var(--font-body);
  font-size:13px;
  line-height:1.45;
  overflow:hidden;
  letter-spacing:0.01em;
  -webkit-font-smoothing:antialiased;
}

/* ── Light theme — visually identical to dark for now.
   Toggle + state still active; styling to be designed later. */

/* fixed 1920×1080 design scaled to viewport */
.workbench{
  position:fixed;
  width:1920px;height:1080px;
  top:0;left:0;
  transform-origin:top left;
  transform:scale(var(--wb-scale,1)) translate(var(--wb-tx,0),var(--wb-ty,0));
  background:var(--bg-0);
  overflow:hidden;
}
/* numeric / display elements use Space Grotesk */
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.display{font-family:var(--font-display);letter-spacing:0.02em}

/* ------ background scene ------ */
.scene{
  position:absolute;inset:0;
  background:
    radial-gradient(1200px 700px at 70% 38%, rgba(34,211,238,0.06), transparent 60%),
    radial-gradient(900px 600px at 18% 78%, rgba(167,139,250,0.04), transparent 60%),
    url('bg.jpg') center/cover no-repeat;
  overflow:hidden;
}
.grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--grid-major) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-major) 1px, transparent 1px),
    linear-gradient(var(--grid-minor) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-minor) 1px, transparent 1px);
  background-size:120px 120px,120px 120px,24px 24px,24px 24px;
  mask-image:radial-gradient(ellipse 80% 70% at 50% 50%, #000 50%, transparent 100%);
}
.scan{
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 4px);
  pointer-events:none;mix-blend-mode:plus-lighter;opacity:0.5;
}
.vignette{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
}

/* ------ generic panels ------ */
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  backdrop-filter:blur(14px) saturate(140%);
  -webkit-backdrop-filter:blur(14px) saturate(140%);
  position:relative;
}
.panel.tight{padding:0}
.panel-hd{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--line);
  font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--text-dim);
}
.panel-hd .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.panel-bd{padding:12px 14px}
.corners > .c1{position:absolute;inset:0;pointer-events:none}
.corners::before,.corners::after,.corners > .c1::before,.corners > .c1::after{
  content:"";position:absolute;width:10px;height:10px;border:1px solid var(--line-2);
}
.corners::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
.corners::after{top:-1px;right:-1px;border-left:0;border-bottom:0}
.corners > .c1::before{bottom:-1px;left:-1px;border-right:0;border-top:0}
.corners > .c1::after{bottom:-1px;right:-1px;border-left:0;border-top:0}

/* ------ agents rail (far right) ------ */
.agents-rail{
  position:absolute;top:0;right:0;bottom:0;width:100px;z-index:32;
  background:linear-gradient(180deg, rgba(8,12,24,0.96), rgba(4,7,14,0.98));
  border-left:1px solid var(--line);
  display:flex;flex-direction:column;
  backdrop-filter:blur(12px) saturate(140%);
}
.agents-rail-hd{
  font-family:var(--font-display);
  font-size:12px;letter-spacing:0.28em;text-transform:uppercase;
  color:var(--text);font-weight:600;
  text-align:center;padding:10px 10px 8px;border-bottom:1px solid var(--line);
  line-height:1.4;flex-shrink:0;
}
.agents-rail-hd em{
  font-style:normal;display:block;font-size:9.5px;letter-spacing:0.22em;
  color:var(--text-mute);margin-top:3px;font-weight:400;
}
.agents-rail-list{
  flex:1;overflow:hidden;padding:6px 8px 8px;display:flex;flex-direction:column;gap:2px;
  min-height:0;
}
.agent-tile{
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px 6px;
  border:1px solid transparent;cursor:pointer;transition:all .18s ease;position:relative;
  border-radius:2px;flex-shrink:0;
}
.agent-tile:hover{background:rgba(15,24,46,0.5)}
.agent-tile.active{
  border-color:rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.04);
  box-shadow:0 0 0 1px rgba(255,255,255,0.18) inset, 0 0 22px rgba(34,211,238,0.18);
}
.agent-tile.busy{
  background:rgba(34,211,238,0.06);
  border-color:rgba(34,211,238,0.4);
}
.agent-tile.off{opacity:0.35}
.agent-tile.locked{pointer-events:none;cursor:default;filter:grayscale(0.85)}
.agent-tile.locked:hover{background:transparent}
.agent-tile .robot-wrap{position:relative;width:42px;height:42px;display:grid;place-items:center}
.agent-tile .robot-wrap svg{width:42px;height:42px}
.agent-tile .badge-count{
  position:absolute;top:-3px;right:-5px;
  min-width:16px;height:16px;border-radius:8px;
  background:#f87171;color:#fff;
  font-size:9.5px;font-weight:700;font-family:var(--font-display);
  display:grid;place-items:center;padding:0 4px;
  box-shadow:0 0 0 2px #04070f;z-index:2;
}
.agent-tile .status-dot{
  position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;
  border:1.5px solid #04070f;z-index:2;
}
.agent-tile .status-dot.online{background:#34d399}
.agent-tile .status-dot.work{background:#22d3ee;box-shadow:0 0 6px #22d3ee;
  animation:wrk-pulse 1.4s ease-in-out infinite}
@keyframes wrk-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.agent-tile .status-dot.off{background:#475569}
.agent-tile-name{text-align:center;line-height:1.1;width:100%;min-width:0}
.agent-tile-name .nm-en{
  font-family:var(--font-display);font-size:12px;color:#fff;font-weight:600;letter-spacing:0.04em;
}
.agent-tile-name .nm-cn{
  font-size:10px;color:var(--text-dim);letter-spacing:0.08em;margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100%;
}
.agent-tile.active .nm-cn{color:#fff}

/* ------ agent hover tooltip ------ */
.agent-tooltip{
  position:absolute;right:110px;width:340px;
  background:rgba(8,14,28,0.98);border:1px solid var(--cat-color, var(--cyan));
  box-shadow:0 0 0 1px rgba(34,211,238,0.12), 0 24px 60px rgba(0,0,0,0.6);
  z-index:50;padding:14px 16px;pointer-events:auto;
  animation:tt-in .18s ease both;
}
.tt-detail-btn{
  flex-shrink:0;padding:5px 10px;border:1px solid var(--cat-color, var(--cyan));
  color:var(--cat-color, var(--cyan));background:rgba(34,211,238,0.06);
  font-family:var(--font-display);font-size:10.5px;letter-spacing:0.08em;
  cursor:pointer;transition:all .15s ease;white-space:nowrap;
}
.tt-detail-btn:hover{background:var(--cat-color, var(--cyan));color:#04060d;font-weight:600}
@keyframes tt-in{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.agent-tooltip::after{
  content:"";position:absolute;right:-7px;top:24px;
  width:12px;height:12px;background:rgba(8,14,28,0.98);
  border-right:1px solid var(--cat-color, var(--cyan));border-top:1px solid var(--cat-color, var(--cyan));
  transform:rotate(45deg);
}
.tt-hd{display:flex;align-items:flex-start;gap:12px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.tt-avatar{flex-shrink:0}
.tt-name{flex:1;line-height:1.25}
.tt-en{font-family:var(--font-display);font-size:14px;color:#fff;font-weight:600;letter-spacing:0.04em}
.tt-cn{font-size:13px;color:var(--text);margin-top:2px;font-weight:500}
.tt-cat{font-size:10.5px;letter-spacing:0.14em;margin-top:4px;font-family:var(--font-display);text-transform:uppercase}
.tt-body{font-size:12px;color:var(--text-dim);line-height:1.6;padding:10px 0}
.tt-skills{display:flex;flex-wrap:wrap;gap:4px;padding-bottom:10px}
.tt-skills span{font-size:10.5px;padding:2px 6px;border:1px solid var(--line);letter-spacing:0.05em}
.tt-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding-top:8px;border-top:1px solid var(--line)}
.tt-stats > div{display:flex;flex-direction:column;align-items:center;gap:1px}
.tt-stats .l{font-size:9.5px;color:var(--text-mute);letter-spacing:0.14em;text-transform:uppercase}
.tt-stats .v{font-family:var(--font-display);font-size:14px;color:#fff;font-weight:600}
.tt-foot{font-size:10px;color:var(--text-mute);text-align:center;margin-top:10px;letter-spacing:0.1em}

/* ------ top bar ------ */
.topbar{
  position:absolute;top:0;left:0;right:100px;height:88px;
  display:flex;align-items:stretch;gap:0;
  background:linear-gradient(180deg, rgba(8,12,24,0.92), rgba(8,12,24,0.65));
  border-bottom:1px solid var(--line);
  z-index:30;
}
.brand{
  display:flex;align-items:center;gap:14px;padding:0 22px 0 24px;
  border-right:1px solid var(--line);min-width:280px;
}
.brand-mark{
  width:40px;height:40px;position:relative;
  display:grid;place-items:center;flex-shrink:0;
}
.brand-icon{width:40px;height:40px;object-fit:contain;display:block}
.brand-text{display:flex;flex-direction:column;line-height:1.1}
.brand-text b{font-family:var(--font-display);font-weight:700;font-size:18px;color:#fff;letter-spacing:0.12em}
.brand-text small{font-size:10.5px;color:var(--text-mute);letter-spacing:0.22em;text-transform:uppercase;margin-top:2px}
.brand-text small em{font-style:normal;color:var(--cyan)}
.brand-tenant{
  display:flex;align-items:center;gap:5px;margin-top:3px;position:relative;
}
.brand-tenant .bt-lbl{
  font-size:9.5px;color:var(--text-mute);letter-spacing:0.2em;text-transform:uppercase;flex-shrink:0;
}
.brand-tenant select{
  background:transparent;border:0;outline:none;
  color:var(--cyan);font-family:var(--font-display);font-size:11.5px;font-weight:600;
  letter-spacing:0.05em;cursor:pointer;appearance:none;-webkit-appearance:none;
  padding-right:14px;max-width:180px;
}
.brand-tenant select option{background:#0a1020;color:#fff}
.brand-tenant .bt-arrow{
  font-size:7px;color:var(--cyan);pointer-events:none;margin-left:-10px;
}

.crumbs{
  display:flex;flex-direction:column;justify-content:center;align-items:flex-start;
  gap:6px;padding:0 18px;border-right:1px solid var(--line);min-width:180px;
}
.crumb{font-size:11.5px;color:var(--text-mute);letter-spacing:0.18em;text-transform:uppercase}
.crumb.active{color:var(--text)}
.crumb-top{cursor:pointer;transition:color .15s ease;padding-left:2px}
.crumb-top:hover{color:var(--cyan)}
.crumb-sep{color:var(--text-mute);opacity:0.45}

.kpis{flex:1;display:flex;align-items:stretch}
.kpi{
  flex:1;padding:12px 18px 8px;display:flex;flex-direction:column;justify-content:flex-start;gap:2px;
  border-right:1px solid var(--line);position:relative;
}
.kpi:last-child{border-right:0}
.kpi .l{font-size:10.5px;color:#fff;letter-spacing:0.22em;text-transform:uppercase}
.kpi .v{font-family:var(--font-display);font-weight:600;font-size:22px;color:#fff;display:flex;align-items:baseline;gap:6px}
.kpi .v small{font-size:11px;color:var(--text-dim);font-weight:400;letter-spacing:0.08em}
.kpi .delta{font-size:10.5px;color:var(--emerald);font-family:var(--font-mono);letter-spacing:0.04em}
.kpi .delta.neg{color:var(--rose)}
.kpi .delta.warn{color:var(--amber)}
.kpi-bar{position:relative;height:1px;background:var(--line);margin-top:7px;align-self:stretch}
.kpi-bar i{display:block;height:1px;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}

.topbar .right{
  display:flex;flex-direction:column;justify-content:center;gap:6px;
  padding:0 18px;border-left:1px solid var(--line);
}
.topbar .right .r-row{
  display:flex;align-items:center;gap:10px;justify-content:flex-end;
}
.topbar .right .r-row-bot{ min-height:24px; }
/* weather pill (bottom-left of right cluster) */
.weather-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:4px;
  background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.22);
  font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.06em;
  color:rgba(200,225,255,0.85);max-width:150px;overflow:hidden;white-space:nowrap;
}
.weather-pill svg{flex-shrink:0;color:var(--cyan);opacity:0.95}
.weather-pill .wx-name{overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1}
.weather-pill .wx-sep{opacity:0.4;flex-shrink:0}
.weather-pill .wx-t{font-weight:600;color:#fff;flex-shrink:0}
/* theme toggle (bottom-right, matches lang-toggle vibe) */
.theme-toggle{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:24px;border-radius:5px;cursor:pointer;flex-shrink:0;
  background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.25);
  color:rgba(180,220,255,0.7);transition:border-color .2s,background .2s,color .2s;
}
.theme-toggle:hover{background:rgba(34,211,238,0.12);border-color:rgba(34,211,238,0.55);color:var(--cyan);}
.tenant-pill{
  display:flex;align-items:center;gap:8px;padding:4px 10px 4px 12px;border:1px solid var(--line);
  font-size:11px;color:var(--text-dim);letter-spacing:0.1em;cursor:pointer;position:relative;
}
.tenant-pill .lbl{font-size:9.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-mute)}
.tenant-pill select{
  background:transparent;border:0;outline:none;color:#fff;font-family:var(--font-display);
  font-size:12px;font-weight:500;letter-spacing:0.06em;cursor:pointer;
  appearance:none;-webkit-appearance:none;padding-right:16px;min-width:140px;
}
.tenant-pill select option{background:#0a1020;color:#fff}
.tenant-pill .arrow{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  color:var(--cyan);font-size:8px;pointer-events:none;line-height:1;
}
.live-wrap{
  display:flex;align-items:center;gap:8px;
}
.live-wrap::before{
  content:"";flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);animation:pulse 1.6s ease-in-out infinite;
}
.live-time{
  display:flex;flex-direction:column;align-items:flex-end;gap:1px;
  font-family:var(--font-mono);letter-spacing:0.12em;color:var(--cyan);
}
.live-time .dt{font-size:10px;opacity:0.75}
.live-time .tm{font-size:12px;font-weight:500}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
.lang-toggle{
  display:flex;align-items:center;gap:3px;
  background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.25);border-radius:5px;
  padding:4px 8px;cursor:pointer;font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;
  color:rgba(180,220,255,0.55);transition:border-color .2s,background .2s;flex-shrink:0;
}
.lang-toggle:hover{background:rgba(34,211,238,0.12);border-color:rgba(34,211,238,0.5);}
.lang-toggle .lt-active{color:var(--cyan);font-weight:600;}
.lang-toggle .lt-sep{opacity:0.35;}

/* ------ stage ------ */
.stage{
  position:absolute;top:88px;left:0;right:100px;bottom:220px;display:flex;gap:14px;padding:14px 14px 14px 20px;
  pointer-events:none;z-index:24; /* above scene-img-bg(z:1) */
}
.stage > *{pointer-events:auto}
.left-rail{width:340px;display:flex;flex-direction:column;gap:14px;transition:width .25s ease}
.left-rail.collapsed{width:32px}
.stream-tab{
  width:32px;display:flex;align-items:stretch;cursor:pointer;
  background:linear-gradient(180deg, rgba(15,22,40,0.9), rgba(8,12,24,0.95));
  border:1px solid var(--line);transition:all .15s ease;
}
.stream-tab:hover{border-color:var(--cyan);background:rgba(34,211,238,0.06)}
.stream-tab-inner{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  padding:14px 0;color:var(--text-dim);position:relative;
}
.stream-tab .arrow{font-family:var(--font-display);font-size:18px;color:var(--cyan);line-height:1}
.stream-tab .vlabel{
  writing-mode:vertical-rl;text-orientation:upright;
  font-family:var(--font-body);font-size:13px;letter-spacing:0.08em;color:#fff;font-weight:500;
}
/* English variant: rotate text as a block instead of stacking each character */
.stream-tab .vlabel-en{
  writing-mode:vertical-rl;text-orientation:mixed;
  font-family:var(--font-display);font-size:12px;letter-spacing:0.24em;color:#fff;font-weight:600;
  text-transform:uppercase;
}
.stream-tab .vsub{
  writing-mode:vertical-rl;font-family:var(--font-display);font-size:9.5px;letter-spacing:0.16em;
  color:var(--text-mute);text-transform:uppercase;
}
.stream-tab .vcount{
  position:absolute;top:6px;right:6px;
  min-width:18px;height:18px;border-radius:9px;padding:0 5px;
  background:rgba(34,211,238,0.18);border:1px solid var(--cyan);color:var(--cyan);
  font-size:10px;font-family:var(--font-mono);font-weight:600;
  display:grid;place-items:center;
}
.center-stretch{flex:1;display:flex;align-items:stretch;justify-content:center;pointer-events:none}
.right-rail{width:360px;display:flex;flex-direction:column;gap:14px;transition:width .25s ease}
.right-rail.collapsed{width:32px}

/* ------ event stream ------ */
.stream{flex:1;display:flex;flex-direction:column;min-height:0}
.stream-body{flex:1;overflow:hidden;position:relative;mask-image:linear-gradient(180deg, transparent 0%, #000 6%, #000 94%, transparent 100%)}
.stream-list{position:absolute;inset:0;padding:8px 0;overflow-y:auto}
.stream-list::-webkit-scrollbar{display:none}
.evt{
  padding:9px 14px 9px 16px;display:flex;flex-direction:column;gap:4px;border-left:2px solid transparent;
  border-bottom:1px dashed rgba(120,160,220,0.06);
  animation:evt-in .5s ease both;
}
.evt .row1{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-mute);font-family:var(--font-mono)}
.evt .row1 .who{color:var(--text);letter-spacing:0.05em}
.evt .row1 .ag{
  padding:1px 6px;border:1px solid var(--line-2);font-size:10px;letter-spacing:0.1em;
}
.evt .txt{font-size:12.5px;color:var(--text);line-height:1.5}
.evt.sev-low{border-left-color:rgba(52,211,153,0.45)}
.evt.sev-mid{border-left-color:rgba(251,191,36,0.55)}
.evt.sev-high{border-left-color:rgba(248,113,113,0.7);background:linear-gradient(90deg, rgba(248,113,113,0.08), transparent 60%)}
@keyframes evt-in{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ------ right rail ------ */
.dispatch{flex:1;display:flex;flex-direction:column;min-height:0;position:relative}

/* history toggle (header button) */
.history-toggle{
  background:transparent;border:1px solid rgba(34,211,238,0.4);color:rgba(180,235,245,0.75);
  width:20px;height:20px;border-radius:3px;cursor:pointer;padding:0;
  display:grid;place-items:center;transition:all .15s ease;flex-shrink:0;
}
.history-toggle:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.1)}
.history-toggle.on{border-color:var(--cyan);color:#fff;background:rgba(34,211,238,0.25);box-shadow:0 0 8px rgba(34,211,238,0.4)}

/* history flyout — slides out to the LEFT of dispatch panel */
.history-flyout{
  position:absolute;top:0;right:calc(100% + 8px);width:280px;height:100%;
  background:linear-gradient(180deg, rgba(15,22,40,0.97), rgba(8,12,24,0.98));
  border:1px solid rgba(34,211,238,0.35);
  box-shadow:0 0 0 1px rgba(34,211,238,0.08), -8px 0 30px rgba(0,0,0,0.5);
  display:flex;flex-direction:column;min-height:0;z-index:5;
  animation:hf-slide .22s cubic-bezier(.2,.7,.3,1);
}
@keyframes hf-slide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.hf-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border-bottom:1px solid var(--line);
  font-family:var(--font-display);font-size:11px;letter-spacing:0.16em;
  color:rgba(210,235,245,0.9);text-transform:uppercase;
}
.hf-close{
  background:transparent;border:1px solid var(--line);color:var(--text-mute);
  width:20px;height:20px;border-radius:3px;cursor:pointer;padding:0;font-size:14px;line-height:1;
  display:grid;place-items:center;transition:all .15s ease;
}
.hf-close:hover{border-color:var(--rose);color:var(--rose)}
.hf-search{padding:8px 10px;border-bottom:1px solid var(--line)}
.hf-search input{
  width:100%;background:rgba(6,10,22,0.6);border:1px solid var(--line);border-radius:2px;
  color:#fff;font-size:11px;padding:6px 8px;outline:none;transition:border-color .15s;
  font-family:var(--font-base);
}
.hf-search input::placeholder{color:var(--text-mute)}
.hf-search input:focus{border-color:var(--cyan)}
.hf-list{flex:1;overflow-y:auto;padding:4px 0;min-height:0;
  scrollbar-width:thin;scrollbar-color:rgba(120,140,180,0.35) transparent;
}
.hf-list::-webkit-scrollbar{width:4px}
.hf-list::-webkit-scrollbar-thumb{background:rgba(120,140,180,0.35);border-radius:2px}
.hf-group-hd{
  font-family:var(--font-mono);font-size:9.5px;color:var(--text-mute);
  letter-spacing:0.18em;text-transform:uppercase;padding:8px 12px 4px;
}
.hf-item{
  display:flex;align-items:flex-start;gap:8px;padding:8px 12px;cursor:pointer;
  border-left:2px solid transparent;transition:all .12s ease;
}
.hf-item{position:relative}
.hf-item:hover{background:rgba(34,211,238,0.08);border-left-color:var(--cyan)}
.hf-item.active{background:rgba(34,211,238,0.12);border-left-color:var(--cyan)}
.hf-item.active .hf-title{color:var(--cyan)}
.hf-active-dot{
  position:absolute;top:50%;right:8px;transform:translateY(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 6px var(--cyan);
}
.hf-item:hover .hf-active-dot{display:none}

/* per-item hover actions (rename / delete) */
.hf-actions{
  position:absolute;top:50%;right:6px;transform:translateY(-50%);
  display:none;gap:2px;
  background:linear-gradient(90deg, transparent, rgba(8,12,24,0.95) 30%);
  padding-left:14px;
}
.hf-item:hover .hf-actions{display:flex}
.hf-act-btn{
  background:transparent;border:1px solid rgba(34,211,238,0.3);
  color:rgba(180,235,245,0.8);width:22px;height:22px;border-radius:3px;
  cursor:pointer;padding:0;display:grid;place-items:center;
  transition:all .12s ease;
}
.hf-act-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.12)}
.hf-act-btn.hf-act-del:hover{border-color:var(--rose);color:var(--rose);background:rgba(244,63,94,0.12)}

/* inline rename input */
.hf-rename-input{
  width:100%;background:rgba(6,10,22,0.9);border:1px solid var(--cyan);border-radius:2px;
  color:#fff;font-size:12px;padding:3px 6px;outline:none;
  font-family:var(--font-base);line-height:1.35;
}
.hf-count{
  font-style:normal;font-family:var(--font-mono);font-size:9.5px;
  color:var(--cyan);background:rgba(34,211,238,0.12);
  padding:1px 5px;border-radius:8px;margin-left:6px;letter-spacing:0.06em;
}
.hf-empty{
  text-align:center;padding:30px 12px;color:var(--text-mute);
  font-size:11px;letter-spacing:0.06em;
}
.hf-tag{
  font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:0.1em;
  padding:2px 5px;border:1px solid;border-radius:2px;flex-shrink:0;margin-top:1px;
}
.hf-info{flex:1;min-width:0}
.hf-title{font-size:12px;color:#fff;line-height:1.35;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hf-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-mute);margin-top:2px}
.hf-foot{padding:8px 10px;border-top:1px solid var(--line)}
.hf-newbtn{
  width:100%;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.45);
  color:var(--cyan);font-size:11px;letter-spacing:0.1em;padding:6px;cursor:pointer;
  border-radius:2px;transition:all .15s ease;
}
.hf-newbtn:hover{background:rgba(34,211,238,0.22);color:#fff}

.panel-collapse{
  background:transparent;border:1px solid var(--line);color:var(--text-dim);
  width:22px;height:22px;font-family:var(--font-display);font-size:14px;line-height:1;
  cursor:pointer;transition:all .15s ease;display:grid;place-items:center;padding:0;
}
.panel-collapse:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.08)}
.dispatch-tab{
  width:32px;display:flex;align-items:stretch;cursor:pointer;
  background:linear-gradient(180deg, rgba(15,22,40,0.9), rgba(8,12,24,0.95));
  border:1px solid var(--line);transition:all .15s ease;
}
.dispatch-tab:hover{border-color:var(--cyan);background:rgba(34,211,238,0.06)}
.dispatch-tab-inner{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  padding:14px 0;color:var(--text-dim);position:relative;
}
.dispatch-tab .arrow{font-family:var(--font-display);font-size:18px;color:var(--cyan);line-height:1}
.dispatch-tab .vlabel{
  writing-mode:vertical-rl;text-orientation:upright;
  font-family:var(--font-body);font-size:13px;letter-spacing:0.08em;color:#fff;font-weight:500;
}
.dispatch-tab .vlabel-en{
  writing-mode:vertical-rl;text-orientation:mixed;
  font-family:var(--font-display);font-size:12px;letter-spacing:0.24em;color:#fff;font-weight:600;
  text-transform:uppercase;
}
.dispatch-tab .vsub{
  writing-mode:vertical-rl;font-family:var(--font-display);font-size:9.5px;letter-spacing:0.16em;
  color:var(--text-mute);text-transform:uppercase;
}
.dispatch-tab .vdot{
  position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:#f87171;
  box-shadow:0 0 6px #f87171;
}
.target-strip{
  display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--line);
  background:rgba(34,211,238,0.05);
}
.target-strip.target-strip-bottom{
  border-bottom:none;border-top:1px solid var(--line);
  flex-wrap:wrap;
}
.target-strip.target-strip-bottom .who{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.target-strip .lbl{font-family:var(--font-display);font-size:10px;color:var(--text-mute);letter-spacing:0.18em;text-transform:uppercase}
.target-strip .who{font-size:12px;font-weight:500;flex:1}
.target-strip .dismiss{font-size:10.5px;color:var(--text-mute);cursor:pointer;letter-spacing:0.1em}
.target-strip .dismiss:hover{color:var(--rose)}
.agent-roster{
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:10px 12px;border-bottom:1px solid var(--line);
}
.av{
  position:relative;height:44px;border:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;align-items:center;
  cursor:pointer;transition:all .15s ease;background:rgba(8,14,28,0.5);
}
.av:hover{border-color:var(--line-2);background:rgba(15,24,46,0.7)}
.av.active{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(34,211,238,0.3) inset, 0 0 16px rgba(34,211,238,0.2)}
.av .c{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:0.04em}
.av .n{font-size:9.5px;color:var(--text-mute);letter-spacing:0.05em;margin-top:1px}
.av .pip{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--emerald);box-shadow:0 0 6px currentColor}
.av.idle .pip{background:#475569;box-shadow:none}
.av.learning .pip{background:var(--amber)}
.av.off .pip{background:transparent;border:1px solid #334155;box-shadow:none}

.chat-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.chat-body::-webkit-scrollbar{width:0}
.msg{display:flex;gap:8px;font-size:12.5px;line-height:1.5;min-width:0}
.msg .a{width:26px;height:26px;border:1px solid var(--line);display:grid;place-items:center;font-family:var(--font-display);font-size:10px;font-weight:700;flex-shrink:0}
.msg .b{flex:1;min-width:0;overflow:hidden;padding:7px 10px;background:rgba(15,24,46,0.6);border:1px solid var(--line)}
.msg .name{font-size:10.5px;color:var(--text-mute);letter-spacing:0.1em;margin-bottom:3px;text-transform:uppercase;font-family:var(--font-display)}
.msg.user .b{background:rgba(34,211,238,0.07);border-color:rgba(34,211,238,0.3)}
.md-body{color:inherit}
.md-body :is(h1,h2,h3){margin:8px 0 6px;font-family:var(--font-display);letter-spacing:0.02em}
.md-body h1{font-size:14px}
.md-body h2{font-size:13px}
.md-body h3{font-size:12.5px}
.md-body p{margin:6px 0}
.md-body ul,.md-body ol{margin:6px 0 6px 18px;padding:0}
.md-body li{margin:2px 0}
.md-body blockquote{margin:8px 0;padding:6px 10px;border-left:2px solid rgba(120,160,220,0.35);background:rgba(8,14,28,0.35)}
.md-body{max-width:100%;overflow:hidden}
.md-body img{max-width:100%;width:100%;height:auto;object-fit:contain;box-sizing:border-box;border-radius:6px;border:1px solid rgba(120,160,220,0.18);display:block;margin:6px 0}
.md-body a{color:var(--cyan);text-decoration:none}
.md-body a:hover{text-decoration:underline}
.md-body table{width:100%;max-width:100%;border-collapse:collapse;display:block;overflow:auto}
.md-body th,.md-body td{border:1px solid rgba(120,160,220,0.18);padding:6px 8px;vertical-align:top}
.md-body thead th{position:sticky;top:0;background:rgba(8,14,28,0.75)}

.quick{
  display:grid;
  grid-auto-flow:column;
  grid-template-rows:repeat(2, auto);
  grid-auto-columns:max-content;
  gap:6px;
  padding:10px 12px;border-top:1px solid var(--line);
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:thin;
  scrollbar-color:rgba(80,100,140,0.35) transparent;
}
.quick::-webkit-scrollbar{height:5px}
.quick::-webkit-scrollbar-track{background:transparent}
.quick::-webkit-scrollbar-thumb{background:rgba(80,100,140,0.35);border-radius:3px}
.quick::-webkit-scrollbar-thumb:hover{background:rgba(120,140,180,0.5)}
.q-chip{
  font-size:11px;padding:5px 9px;border:1px solid var(--line);color:var(--text-dim);cursor:pointer;
  display:flex;align-items:center;gap:5px;background:rgba(8,14,28,0.5);transition:all .12s ease;
  white-space:nowrap;flex-shrink:0;
}
.q-chip:hover{border-color:var(--cyan);color:#fff;background:rgba(34,211,238,0.08)}
.q-chip .tag{font-family:var(--font-display);font-size:9.5px;letter-spacing:0.08em;opacity:0.7}

.composer{
  display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--line);
}
.composer input{
  flex:1;background:rgba(4,8,18,0.6);border:1px solid var(--line);color:var(--text);
  padding:8px 10px;font-family:inherit;font-size:12px;outline:none;
}
.composer input::placeholder{color:var(--ph-color, var(--text-mute));opacity:0.85}
.composer input:focus{border-color:var(--cyan)}
.composer button{
  border:1px solid var(--cyan);background:rgba(34,211,238,0.08);color:var(--cyan);
  padding:8px 12px;font-family:var(--font-display);font-size:11px;letter-spacing:0.12em;cursor:pointer;
  text-transform:uppercase;
}
.composer button:hover{background:rgba(34,211,238,0.18)}
.composer button:disabled{opacity:0.38;cursor:not-allowed;border-color:var(--line);color:var(--text-dim);background:transparent}
.composer button:disabled:hover{background:transparent}

.stream-cursor{
  display:inline-block;margin-left:2px;color:var(--cyan);
  animation:stream-blink 0.9s step-end infinite;
}
@keyframes stream-blink{50%{opacity:0}}

/* ------ bottom dock ------ */
.dock{
  position:absolute;left:0;right:100px;bottom:0;height:220px;
  background:linear-gradient(180deg, rgba(6,10,22,0.55), rgba(4,7,14,0.95));
  border-top:1px solid var(--line);
  display:flex;gap:14px;padding:14px;z-index:25;
}

/* ------ Plant Inline Dock (img2 + focusPlant) ------ */
.plant-inline-dock{
  flex:1;min-width:0;display:flex;gap:10px;height:100%;
}
.pid-card{
  background:linear-gradient(180deg, rgba(8,14,28,0.78), rgba(6,10,22,0.85));
  border:1px solid rgba(120,160,220,0.12);
  padding:10px 14px;
  display:flex;flex-direction:column;gap:7px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .15s, background .15s, transform .15s, box-shadow .15s;
}
.pid-card:hover{
  border-color:rgba(34,211,238,0.5);
  background:linear-gradient(180deg, rgba(34,211,238,0.06), rgba(6,10,22,0.88));
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(0,0,0,0.3);
}
/* sci-fi corner brackets (top-left + top-right) */
.pid-card::before{
  content:'';position:absolute;top:0;left:0;
  width:8px;height:8px;
  border-top:1px solid rgba(34,211,238,0.5);
  border-left:1px solid rgba(34,211,238,0.5);
  transition:border-color .15s;
  pointer-events:none;
}
.pid-card::after{
  content:'';position:absolute;top:0;right:0;
  width:8px;height:8px;
  border-top:1px solid rgba(34,211,238,0.5);
  border-right:1px solid rgba(34,211,238,0.5);
  transition:border-color .15s;
  pointer-events:none;
}
.pid-card:hover::before,.pid-card:hover::after{border-color:var(--cyan)}
.pid-card.pid-no-open{cursor:default}
.pid-card.pid-no-open:hover{
  border-color:rgba(120,160,220,0.12);
  background:linear-gradient(180deg, rgba(8,14,28,0.78), rgba(6,10,22,0.85));
  transform:none;
  box-shadow:none;
}
.pid-card.pid-no-open:hover::before,.pid-card.pid-no-open:hover::after{border-color:rgba(34,211,238,0.5)}
.pid-card.pid-card-dimmed{
  opacity:0.42;filter:grayscale(0.75);pointer-events:none;
}
.pid-card.pid-card-dimmed:hover{
  transform:none;box-shadow:none;
}
.pid-card.pid-card-dimmed:hover::before,
.pid-card.pid-card-dimmed:hover::after{border-color:var(--line)}

.pid-c-kpi{flex:1 1 320px;min-width:280px}
.pid-c-team{flex:1 1 250px;min-width:220px}
.pid-c-log{flex:1 1 310px;min-width:260px}
.pid-c-scene{flex:1.12 1 320px;min-width:240px}
.pid-c-token{flex:1 1 240px;min-width:220px}

/* card header */
.pid-h{
  display:flex;align-items:center;justify-content:space-between;
  font-family:var(--font-display);font-size:10.5px;color:#fff;font-weight:600;
  letter-spacing:0.14em;text-transform:uppercase;
  padding-bottom:4px;border-bottom:1px solid rgba(34,211,238,0.12);
}
.pid-h-cnt{font-family:var(--font-mono);font-size:9.5px;color:var(--cyan);letter-spacing:0.08em;text-transform:none}
.pid-h-badge{font-family:var(--font-mono);font-size:9.5px;color:var(--cyan);letter-spacing:0.08em;text-transform:none}
.pid-h-meta{font-family:var(--font-mono);font-size:9.5px;color:var(--text-mute);letter-spacing:0.08em;text-transform:none}

/* card 1: KPI */
.pid-k-top{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.pid-k-name{font-family:var(--font-display);font-size:15px;color:#fff;font-weight:700;letter-spacing:0.04em;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pid-k-btn{
  font-size:10px;padding:2px 6px;border:1px solid var(--line);
  background:rgba(6,10,22,0.6);color:var(--text-dim);
  font-family:var(--font-mono);letter-spacing:0.04em;cursor:pointer;
  transition:all .12s;
}
.pid-k-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.pid-k-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-mute);letter-spacing:0.06em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pid-k-stats{display:flex;gap:14px;padding:3px 0;border-top:1px dashed rgba(120,160,220,0.1);border-bottom:1px dashed rgba(120,160,220,0.1)}
.pid-k-stats .s{display:flex;flex-direction:column;gap:1px}
.pid-k-stats .l{font-size:9px;color:var(--text-mute);letter-spacing:0.14em;text-transform:uppercase}
.pid-k-stats .v{font-family:var(--font-display);font-size:14px;font-weight:600;color:#fff}
.pid-k-stats .v small{font-size:9px;color:var(--text-mute);margin-left:3px;font-family:var(--font-mono)}
.pid-k-mode{display:flex;gap:4px}
.pid-k-mode button{
  flex:1;font-size:10px;padding:3px 6px;border:1px solid var(--line);
  background:rgba(6,10,22,0.5);color:var(--text-mute);
  font-family:var(--font-mono);letter-spacing:0.06em;cursor:pointer;transition:all .12s;
}
.pid-k-mode button:hover{border-color:var(--cyan);color:#fff}
.pid-k-mode button.on{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.1);box-shadow:0 0 6px rgba(34,211,238,0.18)}
.pid-k-tl{display:flex;flex-direction:column;gap:3px;margin-top:auto}
.pid-tl-chips{display:flex;align-items:center;gap:4px}
.pid-tl-lbl{font-family:var(--font-mono);font-size:9.5px;color:var(--text-dim);letter-spacing:0.06em;margin-left:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.pid-q-chip{
  font-family:var(--font-mono);font-size:10px;padding:1px 7px;
  border:1px solid var(--line);background:transparent;color:var(--text-mute);
  cursor:pointer;letter-spacing:0.06em;transition:all .12s;
}
.pid-q-chip.on{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.08)}
.pid-q-chip:hover{border-color:var(--cyan);color:#fff}
.pid-tl-track{height:3px;background:rgba(120,160,220,0.1);position:relative}
.pid-tl-track i{position:absolute;left:0;top:0;bottom:0;background:var(--cyan);box-shadow:0 0 6px var(--cyan);transition:width .3s linear}
.pid-tl-step{font-family:var(--font-mono);font-size:9px;color:var(--cyan);letter-spacing:0.06em}

/* card 2: team list */
.pid-team-list{flex:1;overflow:hidden;padding-top:2px;display:flex;flex-direction:column;gap:2px}
.pid-team-row{
  display:flex;align-items:center;gap:6px;padding:2px 3px;
  border-bottom:1px dashed rgba(120,160,220,0.06);
}
.pid-team-row.absent{opacity:0.45}
.pid-tc{
  width:24px;height:18px;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:9px;font-weight:700;
  color:var(--cat-c);border:1px solid var(--cat-c);
  background:rgba(6,10,22,0.6);letter-spacing:0.04em;flex-shrink:0;
}
.pid-ti{flex:1;min-width:0}
.pid-tn{font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.02em}
.pid-ts{
  font-family:var(--font-mono);font-size:9px;color:var(--text-mute);
  padding:1px 5px;border:1px solid var(--line);letter-spacing:0.04em;flex-shrink:0;
}
.pid-ts.work{color:var(--cyan);border-color:var(--cyan);background:rgba(34,211,238,0.08)}
.pid-ts.alert{color:var(--rose);border-color:var(--rose);background:rgba(248,113,113,0.08)}

/* card 3: log */
.pid-log-body{flex:1;overflow-y:auto;padding-top:3px;scrollbar-width:none}
.pid-log-body::-webkit-scrollbar{display:none}
.pid-log-ln{padding:4px 2px;border-bottom:1px dashed rgba(120,160,220,0.05);display:flex;flex-direction:column;gap:1px}
.pid-log-hd{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:9.5px;color:var(--text-mute);letter-spacing:0.04em}
.pid-log-hd b{color:var(--cyan);font-weight:600}
.pid-log-hd .tg{margin-left:auto;color:var(--text-mute);font-size:9px}
.pid-log-tx{font-size:10.5px;color:var(--text);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis}

/* card 4: PV array */
.pid-pv-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding-top:3px;min-height:0}
.pid-pv-grid{
  display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(8,1fr);
  gap:2px;width:100%;height:100%;
}
.pid-pv-cell{
  background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.12);
  transition:all .25s;
}
.pid-pv-cell.hot{background:rgba(248,113,113,0.22);border-color:rgba(248,113,113,0.5);animation:hot 1.4s ease-in-out infinite}
.pid-pv-cell.work{background:rgba(34,211,238,0.22);border-color:var(--cyan)}

/* card 5: scene mini */
.pid-scene-wrap{flex:1;position:relative;margin:4px 4px 2px;min-height:0}
.pid-scene-pv{
  position:absolute;left:29%;right:29%;top:32%;bottom:32%;
  display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(8,1fr);gap:1.5px;
  border:1px dashed rgba(34,211,238,0.18);padding:3px;
}
.pid-scene-cell{background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.1)}
.pid-scene-cell.hot{background:rgba(248,113,113,0.22);border-color:rgba(248,113,113,0.45);animation:hot 1.4s ease-in-out infinite}
.pid-scene-cell.work{background:rgba(34,211,238,0.22);border-color:var(--cyan)}
.pid-scene-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.pid-scene-wrap .pid-particle{
  position:absolute;width:4px;height:4px;border-radius:50%;
  transform:translate(-50%,-50%);pointer-events:none;z-index:4;
}
.pid-scene-node{
  position:absolute;transform:translate(-50%,-50%);pointer-events:none;
}
.pid-sn-circle{
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--cat-color);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:8px;font-weight:700;letter-spacing:0.02em;
  transition:all .2s;
}
.pid-scene-node.active .pid-sn-circle{
  box-shadow:0 0 8px var(--cat-color), inset 0 0 4px var(--cat-color);
}
.pid-scene-bubble{
  position:absolute;transform:translate(-50%,-100%);
  background:rgba(6,10,22,0.92);border:1px solid var(--cyan);
  padding:1px 5px;font-family:var(--font-mono);font-size:8.5px;color:var(--cyan);
  letter-spacing:0.04em;pointer-events:none;white-space:nowrap;
  animation:bubble-in 0.4s ease-out;
}
@keyframes bubble-in{0%{opacity:0;transform:translate(-50%,-90%) scale(0.9)}100%{opacity:1;transform:translate(-50%,-100%) scale(1)}}

/* card 6: TOKEN */
.pid-tok-big{font-family:var(--font-display);font-size:22px;color:#fff;font-weight:600;line-height:1}
.pid-tok-big small{font-size:10px;color:var(--text-mute);margin-left:5px;letter-spacing:0.08em;font-family:var(--font-mono)}
.pid-tok-rows{display:flex;flex-direction:column;gap:1px;font-family:var(--font-mono);font-size:10px;color:var(--text-mute)}
.pid-tok-rows .r{display:flex;justify-content:space-between;padding:1px 0;border-bottom:1px dashed rgba(120,160,220,0.05)}
.pid-tok-rows .r span:last-child{color:#fff}
.pid-tok-spark{flex:1;width:100%;min-height:18px;display:block;margin-top:auto}

/* ------ TopBar crumb plant picker ------ */
.crumb-picker{position:relative;display:inline-block;z-index:61}
.picker-btn{
  cursor:pointer;display:inline-flex;align-items:center;gap:8px;
  padding:7px 14px;
  border:1px solid rgba(34,211,238,0.25);
  background:rgba(34,211,238,0.04);
  color:var(--text);
  font-size:11.5px;letter-spacing:0.18em;text-transform:uppercase;
  font-family:inherit;
  transition:all .15s ease;
  user-select:none;
  position:relative;
  outline:none;
}
.picker-btn:hover{color:var(--cyan);border-color:rgba(34,211,238,0.55);background:rgba(34,211,238,0.1)}
.picker-btn.open{
  color:var(--cyan);border-color:var(--cyan);
  background:rgba(34,211,238,0.14);
  box-shadow:0 0 12px rgba(34,211,238,0.25);
}
.picker-btn-name{display:inline-block}
.picker-caret{font-size:9px;color:var(--cyan);transition:transform .2s ease;display:inline-block;opacity:0.85}
.picker-btn:hover .picker-caret,.picker-btn.open .picker-caret{opacity:1}
.picker-caret.open{transform:rotate(180deg)}
.crumb-picker-menu{
  position:absolute;top:calc(100% + 4px);left:0;min-width:280px;z-index:60;
  background:rgba(6,10,22,0.96);border:1px solid rgba(34,211,238,0.35);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(34,211,238,0.08);
  padding:4px;
  animation:cpm-in .15s ease-out;
}
/* invisible bridge so cursor can travel from trigger to menu without flicker */
.crumb-picker-menu::before{
  content:'';position:absolute;top:-6px;left:0;right:0;height:6px;
}
@keyframes cpm-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.cpm-h{font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;color:var(--text-mute);
  padding:6px 10px 5px;text-transform:uppercase;border-bottom:1px dashed rgba(120,160,220,0.1);margin-bottom:2px}
.cpm-item{display:flex;align-items:center;gap:9px;padding:7px 10px;cursor:pointer;transition:background .12s, padding .12s}
.cpm-item:hover{background:rgba(34,211,238,0.1);padding-left:13px}
.cpm-item.active{background:rgba(34,211,238,0.14)}
.cpm-item.active:hover{background:rgba(34,211,238,0.2)}
.cpm-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 4px currentColor}
.cpm-dot-low{background:var(--emerald);color:var(--emerald)}
.cpm-dot-mid{background:var(--amber);color:var(--amber)}
.cpm-dot-high{background:var(--rose);color:var(--rose)}
.cpm-name{flex:1;font-family:var(--font-display);font-size:12.5px;color:#fff;letter-spacing:0.02em}
.cpm-item.active .cpm-name{color:var(--cyan);font-weight:600}
.cpm-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-mute);letter-spacing:0.04em}

.mini-map{width:260px;flex-shrink:0}
.skill-matrix{flex:1;min-width:0}
.quick-funcs{width:300px;flex-shrink:0}

.matrix-grid{
  display:grid;grid-template-columns:repeat(5,minmax(0,1fr));
  grid-template-rows:repeat(2,1fr);
  gap:8px;padding:10px;
  height:calc(100% - 38px);
  align-content:stretch;
}
.agent-card{
  position:relative;padding:8px 10px 8px 12px;background:rgba(8,14,28,0.6);border:1px solid var(--line);
  display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:all .15s ease;
  min-height:0;min-width:0;overflow:hidden;container-type:inline-size;
}
.agent-card:hover{border-color:var(--line-2);background:rgba(15,24,46,0.8);transform:translateY(-1px)}
.agent-card.busy{border-color:rgba(34,211,238,0.5)}
.agent-card.busy::before{
  content:"";position:absolute;inset:0;border:1px solid var(--cyan);
  animation:pulse-border 1.5s ease-in-out infinite;pointer-events:none;
}
@keyframes pulse-border{0%,100%{opacity:0.4}50%{opacity:0.9;box-shadow:0 0 24px rgba(34,211,238,0.25) inset}}
.agent-card .top{display:flex;align-items:center;gap:7px;min-width:0;width:100%}
.agent-card .top > div:last-child{min-width:0;flex:1;overflow:hidden}
.agent-card .code{
  width:28px;height:28px;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:0.04em;
  border:1px solid currentColor;color:var(--cat-color);flex-shrink:0;
}
.agent-card .nm{font-size:12px;color:#fff;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-card .rl{font-size:10px;color:var(--text-mute);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-card .meta{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-top:auto;min-width:0;width:100%;flex-wrap:wrap;row-gap:3px}
.agent-card .badge{
  font-size:9.5px;letter-spacing:0.04em;padding:1px 5px;border:1px solid var(--line);color:var(--text-dim);
  font-family:var(--font-mono);white-space:nowrap;flex-shrink:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;
}
.agent-card .badge.work{color:var(--cyan);border-color:rgba(34,211,238,0.35)}
.agent-card .badge.idle{color:var(--text-mute)}
.agent-card .badge.learn{color:var(--amber);border-color:rgba(251,191,36,0.35)}
.agent-card .tok{font-family:var(--font-mono);font-size:10px;color:var(--text-mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;text-align:right}
@container (max-width: 180px){
  .agent-card .nm{font-size:11.5px}
  .agent-card .rl{font-size:9.5px}
  .agent-card .tok{font-size:9.5px}
  .agent-card .code{width:26px;height:26px;font-size:9.5px}
}
.cat-strip{position:absolute;top:0;left:0;bottom:0;width:2px;background:var(--cat-color);opacity:0.7}

/* agent token panel */
.agent-token-panel{flex:1;min-width:0;overflow:hidden}
.token-grid{
  display:block;
  padding:6px 10px 8px;height:calc(100% - 38px);
  overflow:hidden;position:relative;
}
.token-grid::after{
  /* edge fades */
  content:'';position:absolute;top:0;right:0;bottom:0;width:60px;pointer-events:none;
  background:linear-gradient(270deg, rgba(4,7,14,0.95), transparent);
}
.token-grid::before{
  content:'';position:absolute;top:0;left:0;bottom:0;width:60px;pointer-events:none;z-index:2;
  background:linear-gradient(90deg, rgba(4,7,14,0.95), transparent);
}
.token-track{
  display:flex;flex-direction:row;gap:8px;height:100%;
  width:max-content;
  animation:token-scroll 60s linear infinite;
  will-change:transform;
}
.token-track:hover{animation-play-state:paused}
@keyframes token-scroll{
  from{transform:translateX(0)}
  to  {transform:translateX(-50%)} /* half = original length (we duplicate items) */
}
.token-card{
  flex:0 0 280px;
  background:rgba(6,10,22,0.72);border:1px solid rgba(34,211,238,0.1);
  border-radius:2px;
  padding:5px 7px 4px;cursor:pointer;
  display:flex;flex-direction:column;gap:3px;
  transition:border-color .15s, background .15s, transform .15s;position:relative;overflow:hidden;
}
.token-card:hover{border-color:var(--cat-color);background:rgba(34,211,238,0.05);transform:translateY(-1px)}
.token-card.busy{border-color:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,0.25)}
.tc-top{display:flex;align-items:center;gap:5px}
.tc-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.tc-name{font-family:var(--font-display);font-size:12px;color:#fff;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-st{font-family:var(--font-mono);font-size:12px}
.tc-st.work{color:var(--cyan)}.tc-st.idle{color:var(--text-mute)}
.tc-tok{font-family:var(--font-mono);font-size:13px;color:var(--cat-color);font-weight:700;flex-shrink:0}
.tc-spark{width:100%;flex:1;min-height:18px;display:block}
.tc-spark polyline,.tc-spark polygon{transition:all .6s ease-out}
.tc-foot{display:flex;justify-content:space-between;
  font-family:var(--font-mono);font-size:11px;color:var(--text-mute)}

/* mini map */
.mm-canvas{
  position:relative;height:100%;background:
    radial-gradient(circle at 30% 40%, rgba(34,211,238,0.05), transparent 70%),
    #060b18;
  border:0;
}
.mm-marker{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--cyan);transform:translate(-50%,-50%);
  box-shadow:0 0 8px var(--cyan)}
.mm-marker.high{background:var(--rose);box-shadow:0 0 8px var(--rose)}
.mm-marker.mid{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.mm-marker.focus{outline:2px solid var(--cyan);outline-offset:3px}

/* quick funcs */
.qf-list{display:flex;flex-direction:column}
.qf-item{
  display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;
  transition:background .12s ease;
}
.qf-item:last-child{border-bottom:0}
.qf-item:hover{background:rgba(15,24,46,0.5)}
.qf-ic{width:28px;height:28px;border:1px solid var(--line);display:grid;place-items:center;color:var(--cyan);font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:0.04em}
.qf-tx{flex:1;font-size:12px;color:var(--text)}
.qf-tx small{display:block;font-size:10.5px;color:var(--text-mute);margin-top:1px}
.qf-val{font-family:var(--font-mono);font-size:13px;color:#fff;font-weight:500}
.qf-val small{color:var(--text-mute);font-size:10px;margin-left:3px}

/* ------ view mode strip (vertical, far-left of event stream) ------ */
.mode-strip{
  position:absolute;left:6px;top:94px;z-index:35;
  display:flex;flex-direction:column;gap:4px;
  background:rgba(6,10,22,0.78);border:1px solid var(--line);
  padding:5px;backdrop-filter:blur(8px);
}
.mode-btn{
  width:48px;padding:8px 4px;cursor:pointer;
  background:rgba(8,14,28,0.4);border:1px solid transparent;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:var(--font-display);font-size:9.5px;color:var(--text-dim);
  letter-spacing:0.06em;line-height:1.15;text-align:center;
  transition:all .15s ease;
}
.mode-btn .ic{font-size:15px;line-height:1;color:var(--text-dim)}
.mode-btn .lb{font-size:9px;letter-spacing:0.08em}
.mode-btn:hover{border-color:var(--line-2);background:rgba(34,211,238,0.06);color:var(--text)}
.mode-btn:hover .ic{color:var(--cyan)}
.mode-btn.on{
  border-color:var(--cyan);background:rgba(34,211,238,0.14);color:#fff;
  box-shadow:0 0 10px rgba(34,211,238,0.22) inset;
}
.mode-btn.on .ic{color:var(--cyan)}

/* ------ 3D scene container ------ */
.scene-3d{
  position:absolute;top:88px;left:0;right:100px;bottom:220px;
  pointer-events:auto;background:#04060d;overflow:hidden;
}
.scene-3d canvas{display:block;width:100%;height:100%}
.scene-3d-overlay{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 50%, transparent 40%, rgba(2,5,12,0.55) 100%);
}
.scene-3d .scene-label{
  position:absolute;left:50%;top:40px;transform:translateX(-50%);
  font-family:var(--font-display);font-size:20px;letter-spacing:0.28em;
  color:#fff;font-weight:600;text-shadow:0 0 14px rgba(34,211,238,0.6);
  pointer-events:none;
}
.scene-3d .scene-label small{
  display:block;text-align:center;font-size:11px;letter-spacing:0.32em;
  color:var(--cyan);margin-top:6px;font-weight:400;
}
.scene-3d .scene-mode-tag{
  position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.2em;
  color:var(--text-mute);padding:4px 12px;border:1px solid var(--line);
  background:rgba(6,10,22,0.7);
}
.scene-3d .scene-mode-tag b{color:var(--cyan);font-weight:500}

/* ------ image mode (full-bleed picture as workbench bottom layer) ------ */
.scene-img-bg{
  position:absolute;inset:0;z-index:1;
  background-color:#04060d;
  background-position:center;background-size:cover;background-repeat:no-repeat;
}
.scene-img-bg::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 75% 65% at 50% 50%, transparent 55%, rgba(2,5,12,0.5) 100%);
}
.scene-img-tag{
  position:absolute;left:50%;bottom:240px;transform:translateX(-50%);z-index:24;
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.2em;
  color:var(--text-mute);padding:4px 12px;border:1px solid var(--line);
  background:rgba(6,10,22,0.7);
}
.scene-img-tag b{color:var(--cyan);font-weight:500}

/* video background */
.scene-video-bg{
  position:absolute;inset:0;z-index:1;width:100%;height:100%;
  object-fit:cover;background:#04060d;
}
.scene-video-bg::after{ /* can't use ::after on video, handled via overlay sibling */ }

/* map2 展示/漫游 toggle */
.map2-toggle{
  position:absolute;bottom:234px;left:50%;transform:translateX(-50%);
  z-index:26;display:flex;gap:4px;pointer-events:auto;
}
.map2-toggle-btn{
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;
  padding:5px 18px;border:1px solid var(--line);cursor:pointer;
  background:rgba(6,10,22,0.82);color:var(--text-mute);
  transition:all .15s ease;
  backdrop-filter:blur(6px);
}
.map2-toggle-btn:hover{border-color:var(--cyan);color:#fff}
.map2-toggle-btn.active{
  border-color:var(--cyan);color:var(--cyan);
  background:rgba(34,211,238,0.1);
  box-shadow:0 0 10px rgba(34,211,238,0.2);
}

/* ------ plant title (centered banner in img2 mode) ------ */
.plant-title{
  position:absolute;top:104px;left:50%;transform:translateX(-50%);
  z-index:48;pointer-events:auto;
}
.pt-corner{position:absolute;width:8px;height:8px;border:1px solid var(--cyan);pointer-events:none}
.pt-corner-tl{top:-2px;left:-2px;border-right:none;border-bottom:none}
.pt-corner-tr{top:-2px;right:-2px;border-left:none;border-bottom:none}
.pt-corner-bl{bottom:-2px;left:-2px;border-right:none;border-top:none}
.pt-corner-br{bottom:-2px;right:-2px;border-left:none;border-top:none}
.pt-main{
  display:flex;align-items:center;gap:12px;
  padding:8px 18px;cursor:pointer;
  background:linear-gradient(180deg, rgba(6,10,22,0.92), rgba(6,10,22,0.78));
  border:1px solid rgba(34,211,238,0.35);
  backdrop-filter:blur(8px);
  box-shadow:0 4px 24px rgba(0,0,0,0.45), inset 0 1px 0 rgba(34,211,238,0.08);
}
.pt-main:hover{border-color:var(--cyan)}
.pt-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);animation:ptpulse 1.6s ease-in-out infinite}
@keyframes ptpulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pt-name{font-family:var(--font-display);font-size:18px;font-weight:700;
  color:#fff;letter-spacing:0.04em}
.pt-region{font-family:var(--font-mono);font-size:11px;color:var(--text-mute);
  padding-left:12px;border-left:1px solid rgba(255,255,255,0.12)}
.pt-caret{font-size:12px;color:var(--cyan);transition:transform .15s ease}
.pt-caret.open{transform:rotate(180deg)}
.pt-menu{
  position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
  min-width:300px;
  background:rgba(6,10,22,0.96);border:1px solid rgba(34,211,238,0.3);
  backdrop-filter:blur(10px);
  box-shadow:0 8px 32px rgba(0,0,0,0.55);
  padding:4px;
}
.pt-menu-h{font-family:var(--font-mono);font-size:10px;letter-spacing:0.2em;
  color:var(--text-mute);padding:6px 10px 4px;text-transform:uppercase}
.pt-item{display:flex;align-items:center;gap:10px;padding:7px 10px;cursor:pointer;
  transition:background .12s ease}
.pt-item:hover{background:rgba(34,211,238,0.1)}
.pt-item.active{background:rgba(34,211,238,0.15)}
.pt-i-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pt-i-dot-low{background:var(--emerald)}
.pt-i-dot-mid{background:var(--amber)}
.pt-i-dot-high{background:var(--rose)}
.pt-i-name{flex:1;font-family:var(--font-display);font-size:12px;color:#fff}
.pt-item.active .pt-i-name{color:var(--cyan)}
.pt-i-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-mute)}

/* ------ map (background) ------ */
.map-wrap{
  position:absolute;top:88px;left:0;right:100px;bottom:220px;
  pointer-events:auto;
}
.map-svg{width:100%;height:100%;display:block}
.plant-node{cursor:pointer;transition:transform .2s ease}
.plant-node:hover{transform:scale(1.05)}
.plant-label{font-family:var(--font-display);font-size:11px;fill:#fff;letter-spacing:0.04em;font-weight:500;pointer-events:none}
.plant-sub{font-family:var(--font-mono);font-size:9.5px;fill:var(--text-mute);letter-spacing:0.04em;pointer-events:none}
.plant-ring{fill:none;stroke:currentColor;stroke-width:1}
.plant-ring.r2{stroke-opacity:0.5}
.plant-ring.r3{stroke-opacity:0.25}
.plant-pulse{animation:plant-pulse 2.6s ease-in-out infinite}
@keyframes plant-pulse{0%,100%{opacity:0.25}50%{opacity:0.85}}

/* ------ map2 floating pins overlay ------ */
.map2-overlay{
  position:absolute;inset:0;pointer-events:none;z-index:5;
}
.map2-pin{
  position:absolute;pointer-events:auto;cursor:pointer;
  transform:translate(-50%,-100%);
  display:flex;flex-direction:column;align-items:center;
  animation:pin-float 3.2s ease-in-out infinite;
  filter:drop-shadow(0 0 6px var(--pin-color));
}
.map2-pin:hover .map2-pin-label{border-color:#fff;background:rgba(12,20,44,0.98)}
.map2-pin.active .map2-pin-label{border-color:#fff;box-shadow:0 0 12px var(--pin-color)}
.map2-pin-label{
  background:rgba(4,8,20,0.88);
  border:1px solid var(--pin-color);
  border-radius:3px;
  padding:5px 10px;
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  backdrop-filter:blur(6px);
  transition:all .15s ease;
  white-space:nowrap;
}
.map2-pin-name{
  font-family:var(--font-mono);font-size:11px;color:#fff;
  letter-spacing:0.06em;font-weight:600;
}
.map2-pin-meta{
  font-family:var(--font-mono);font-size:9.5px;color:var(--pin-color);
  letter-spacing:0.04em;
}
.map2-pin-line{
  width:1px;height:14px;background:linear-gradient(to bottom, var(--pin-color), transparent);
  opacity:0.8;
}
.map2-pin-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--pin-color);position:relative;
  box-shadow:0 0 8px var(--pin-color), 0 0 16px var(--pin-color);
}
.map2-pin-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:1.5px solid var(--pin-color);opacity:0.5;
  animation:pin-ring 2.2s ease-out infinite;
}
.map2-pin-ring2{
  position:absolute;inset:-10px;border-radius:50%;
  border:1px solid var(--pin-color);opacity:0.25;
  animation:pin-ring 2.2s ease-out infinite .6s;
}
@keyframes pin-float{
  0%,100%{transform:translate(-50%,-100%) translateY(0)}
  50%{transform:translate(-50%,-100%) translateY(-8px)}
}
@keyframes pin-ring{
  0%{transform:scale(1);opacity:0.5}
  100%{transform:scale(2.2);opacity:0}
}

/* ------ patrol robots (map2 show mode) ------ */
.patrol-robot{
  position:absolute;
  width:170.6px;height:96px;
  transform:translate(-50%,-50%);   /* left/top 定位机器人中心 */
  pointer-events:none;
  z-index:6;
  filter:drop-shadow(0 0 8px rgba(34,211,238,0.6)) drop-shadow(0 0 16px rgba(34,211,238,0.32));
  will-change:left,top,transform;
}
/* 序列帧角色走路动画：Sprite01.png 共 16 帧（3413×120），按 0.8 缩放显示为每帧 170.6×96。
   走路速度：每 2 秒走完 16 帧。 */
.patrol-robot-sprite{
  width:170.6px;height:96px;
  background-image:url('Sprite01.png');
  background-repeat:no-repeat;
  background-size:2730.4px 96px;   /* 0.8 倍：16 帧 × 170.6px = 2730.4px */
  animation:sprite-walk 2s steps(16) infinite;
}
@keyframes sprite-walk{
  from{background-position:0 0;}
  to{background-position:-2730.4px 0;}
}
.patrol-robot-shadow{
  position:absolute;left:50%;bottom:8px;
  width:56px;height:11px;
  transform:translateX(-50%);
  background:radial-gradient(ellipse 50% 50% at 50% 50%, rgba(34,211,238,0.5), transparent 70%);
  filter:blur(2px);
  animation:robot-shadow 1.1s ease-in-out infinite;
}
@keyframes robot-bob{
  0%,100%{transform:translateY(-2px)}
  50%{transform:translateY(-6px)}
}
@keyframes robot-shadow{
  0%,100%{opacity:0.9;transform:translateX(-50%) scale(1)}
  50%{opacity:0.55;transform:translateX(-50%) scale(0.78)}
}

/* path 1 — 左侧红圈（Perak 下方跑道）· 中心 ~33%,62% 椭圆循环 */
.patrol-robot-1{
  animation:patrol-path-1 14s linear infinite;
}
@keyframes patrol-path-1{
  0%   {left:28%;top:52%}
  25%  {left:33%;top:48%}
  50%  {left:38%;top:52%}
  75%  {left:33%;top:56%}
  100% {left:28%;top:52%}
}

/* path 2 — 中下红圈（Johor 下方光伏）· 中心 ~43%,82% 椭圆循环 */
.patrol-robot-2{
  animation:patrol-path-2 16s linear infinite;
}
@keyframes patrol-path-2{
  0%   {left:38%;top:72%}
  25%  {left:43%;top:69%}
  50%  {left:48%;top:72%}
  75%  {left:43%;top:75%}
  100% {left:38%;top:72%}
}

/* path 3 — 右侧红圈（Penang-Commercial 旁绿地）· 中心 ~85%,60% 横向扁椭圆 */
.patrol-robot-3{
  animation:patrol-path-3 15s linear infinite;
}
@keyframes patrol-path-3{
  0%   {left:77%;top:60%}
  25%  {left:85%;top:57%}
  50%  {left:93%;top:60%}
  75%  {left:85%;top:63%}
  100% {left:77%;top:60%}
}

/* sprite 方向翻转 — 走"右/下"段时水平镜像（朝右），走"左/上"段时恢复默认（朝左）
   每个机器人的翻转周期与其 patrol-path-* 周期一致。
   用 steps(1) 实现瞬时翻面，避免动画过渡时整张图被压扁。 */
.patrol-robot-1 .patrol-robot-sprite{animation: sprite-walk 2s steps(16) infinite, sprite-flip-14s 14s steps(1) infinite}
.patrol-robot-2 .patrol-robot-sprite{animation: sprite-walk 2s steps(16) infinite, sprite-flip-16s 16s steps(1) infinite}
.patrol-robot-3 .patrol-robot-sprite{animation: sprite-walk 2s steps(16) infinite, sprite-flip-15s 15s steps(1) infinite}
@keyframes sprite-flip-14s{
  0%   {transform:scaleX(-1)}   /* 0→50% 路径向右，水平翻转朝右 */
  50%  {transform:scaleX(1)}    /* 50→100% 路径向左，恢复朝左 */
}
@keyframes sprite-flip-16s{
  0%   {transform:scaleX(-1)}
  50%  {transform:scaleX(1)}
}
@keyframes sprite-flip-15s{
  0%   {transform:scaleX(-1)}
  50%  {transform:scaleX(1)}
}

/* ------ plant detail overlay ------ */
.detail-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:55;
  background:radial-gradient(ellipse 60% 60% at 50% 50%, rgba(4,7,16,0.55), transparent 80%);
}
/* img2 mode + focused plant: detail popup is click-triggered (regular modal) */
.detail{
  pointer-events:auto;width:1640px;height:780px;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(20,38,72,0.85), rgba(6,10,22,0.96)),
    rgba(4,7,16,0.94);
  border:1px solid var(--cyan);
  box-shadow:0 0 0 1px rgba(34,211,238,0.15), 0 30px 90px rgba(0,0,0,0.6);
  position:relative;
  display:grid;grid-template-rows:auto 1fr auto;
  opacity:1;min-height:0;
}
.detail-body{
  display:grid;grid-template-columns:1fr 5fr;
  min-height:0;overflow:hidden;
}
.detail-left{
  display:flex;flex-direction:column;gap:10px;padding:14px;
  border-right:1px solid var(--line);
  overflow:hidden;min-height:0;
}
.detail-right{
  position:relative;overflow:hidden;min-height:0;
  display:flex;
}
.detail-right > .scene-stage{ flex:1; min-width:0; min-height:0; }
@keyframes detail-in{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.detail-hd{
  position:relative;
  display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;border-bottom:1px solid var(--line);
}
.detail-hd .mode-tabs.hd-center{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
}
.detail-hd .title{display:flex;flex-direction:column;gap:3px}
.detail-hd .title b{font-family:var(--font-display);font-size:18px;color:#fff;font-weight:600;letter-spacing:0.06em}
.detail-hd .title small{font-size:11px;color:var(--text-mute);letter-spacing:0.18em;text-transform:uppercase}
.detail-hd .stats{display:flex;gap:18px}
.detail-hd .stats .s{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.detail-hd .stats .s .l{font-size:9.5px;color:var(--text-mute);letter-spacing:0.16em;text-transform:uppercase}
.detail-hd .stats .s .v{font-family:var(--font-display);font-size:16px;color:#fff;font-weight:600}
.mode-tabs{display:flex;gap:0;border:1px solid var(--line)}
.mode-tabs button{
  background:transparent;border:0;color:var(--text-mute);padding:6px 14px;font-family:var(--font-display);font-size:11px;letter-spacing:0.14em;
  cursor:pointer;text-transform:uppercase;
}
.mode-tabs button.on{background:rgba(34,211,238,0.1);color:var(--cyan)}
.mode-tabs.mode-tabs-locked button:disabled,
.pid-k-mode.pid-k-mode-locked button:disabled{opacity:0.38;cursor:not-allowed;color:var(--text-dim)}
.pid-k-mode.pid-k-mode-locked button.on:disabled{
  opacity:1;cursor:not-allowed;color:var(--cyan);
  border-color:var(--cyan);background:rgba(34,211,238,0.1);
  box-shadow:0 0 6px rgba(34,211,238,0.18);
}
.pid-tl-lbl-only{color:var(--cyan);letter-spacing:0.06em;font-size:11px}
.detail-close{
  width:30px;height:30px;border:1px solid var(--line);display:grid;place-items:center;color:var(--text-dim);
  cursor:pointer;font-family:var(--font-display);font-size:14px;
}
.detail-close:hover{border-color:var(--rose);color:var(--rose)}
.detail-btn{
  height:30px;padding:0 12px;border:1px solid rgba(120,160,220,0.22);display:inline-flex;align-items:center;gap:6px;
  color:var(--text-dim);cursor:pointer;font-family:var(--font-display);font-size:11px;letter-spacing:0.1em;
  background:rgba(8,14,28,0.75);transition:all .15s ease;white-space:nowrap;
}
.detail-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.08)}
.detail-btn.fs:hover{border-color:var(--violet);color:var(--violet);background:rgba(167,139,250,0.08)}
/* fullscreen state */
.detail:fullscreen,.detail:-webkit-full-screen{
  width:100vw!important;height:100vh!important;border:0;
  background:#04060d;
}
.detail:fullscreen .scene-stage,.detail:-webkit-full-screen .scene-stage{height:calc(100vh - 118px)!important}
/* video overlay */
.video-overlay{
  position:absolute;inset:0;z-index:60;background:rgba(2,5,12,0.96);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  animation:fadein .2s ease;
}
.video-overlay video{
  max-width:92%;max-height:80%;border:1px solid var(--cyan);
  box-shadow:0 0 40px rgba(34,211,238,0.2);
}
.video-overlay .v-close{
  position:absolute;top:16px;right:16px;width:34px;height:34px;border:1px solid var(--line);
  display:grid;place-items:center;color:var(--text-dim);cursor:pointer;font-size:18px;
  background:rgba(8,14,28,0.8);
}
.video-overlay .v-close:hover{border-color:var(--rose);color:var(--rose)}

.scene-stage{position:relative;overflow:hidden}
.scene-stage svg{position:absolute;inset:0;width:100%;height:100%}
.plant-graphic{position:absolute;inset:18% 26%;border:1px dashed rgba(34,211,238,0.25)}
.array-grid{
  position:absolute;inset:0;display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(8,1fr);gap:2px;padding:6px;
}
.array-cell{background:rgba(34,211,238,0.04);border:1px solid rgba(34,211,238,0.1)}
.array-cell.hot{background:rgba(248,113,113,0.18);border-color:rgba(248,113,113,0.45);animation:hot 1.4s ease-in-out infinite}
.array-cell.work{background:rgba(34,211,238,0.18);border-color:var(--cyan)}
@keyframes hot{0%,100%{opacity:0.7}50%{opacity:1;box-shadow:0 0 12px rgba(248,113,113,0.4)}}

.agent-node{
  position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;
  transform:translate(-50%,-50%);transition:all .4s ease;
}
.agent-node .av-circle{
  width:42px;height:42px;border:1px solid currentColor;display:grid;place-items:center;
  font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:0.04em;color:var(--cat-color);
  background:rgba(6,10,22,0.85);position:relative;
}
.agent-node .av-circle::before{
  content:"";position:absolute;inset:-4px;border:1px solid currentColor;opacity:0;transition:opacity .25s;
}
.agent-node.active .av-circle::before{opacity:0.7;animation:ring 1.2s ease-in-out infinite}
@keyframes ring{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.25);opacity:0.1}}
.agent-node .lbl{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:0.06em}
.agent-node.active .lbl{color:#fff}

.scene-bubble{
  position:absolute;max-width:240px;background:rgba(8,14,28,0.92);border:1px solid var(--line-2);
  padding:8px 11px;font-size:11.5px;line-height:1.5;color:var(--text);
  transform:translate(-50%,-110%);
  animation:bubble-in .4s ease both;
  pointer-events:none;
}
.scene-bubble .tag{font-family:var(--font-display);font-size:9.5px;color:var(--cyan);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:3px;display:block}
@keyframes bubble-in{from{opacity:0;transform:translate(-50%,-100%)}to{opacity:1;transform:translate(-50%,-110%)}}

.scenario-timeline{padding:10px 20px 14px;border-top:1px solid var(--line);display:flex;gap:14px;align-items:center}
.scenario-timeline .lbl{font-family:var(--font-display);font-size:11px;color:var(--text-mute);letter-spacing:0.14em;text-transform:uppercase;min-width:140px}
.scenario-timeline .track{flex:1;height:4px;background:var(--line);position:relative}
.scenario-timeline .track i{position:absolute;left:0;top:0;bottom:0;background:var(--cyan);box-shadow:0 0 8px var(--cyan);transition:width .3s linear}
.scenario-timeline .pips{display:flex;gap:2px}
.scenario-timeline .pip{width:4px;height:14px;background:var(--line-2)}
.scenario-timeline .pip.done{background:var(--cyan);box-shadow:0 0 4px var(--cyan)}
.scenario-timeline .step-name{min-width:240px;font-size:11px;color:var(--text);font-family:var(--font-mono)}

/* ------ skill market entry btn (bottom of agents-rail) ------ */
/* drone button (above SKILLS) */
.drone-btn{
  margin:6px 8px 0;padding:7px 4px 6px;
  border:1px solid rgba(167,139,250,0.25);
  background:rgba(167,139,250,0.04);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:all .18s ease;position:relative;flex-shrink:0;
}
.drone-btn:hover{border-color:var(--violet);background:rgba(167,139,250,0.1);box-shadow:0 0 12px rgba(167,139,250,0.22)}
.drone-btn.active{border-color:var(--violet);background:rgba(167,139,250,0.16);box-shadow:0 0 14px rgba(167,139,250,0.35);pointer-events:none}
.drone-btn-icon{
  width:36px;height:36px;display:grid;place-items:center;position:relative;
  border:1px solid rgba(167,139,250,0.35);
  background:radial-gradient(circle at 40% 40%, rgba(167,139,250,0.16), transparent 70%);
}
.drone-btn-icon img{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(167,139,250,0.5))}
.drone-btn:hover .drone-btn-icon img,.drone-btn.active .drone-btn-icon img{
  animation:drone-bob 1.2s ease-in-out infinite;
}
@keyframes drone-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.drone-btn-lbl{font-family:var(--font-display);font-size:11px;letter-spacing:0.16em;color:#fff;font-weight:600;text-transform:uppercase}
.drone-btn-sub{font-family:var(--font-mono);font-size:9px;letter-spacing:0.08em;color:var(--text-mute)}

/* drone flying overlay */
.drone-flight{
  position:absolute;z-index:55;pointer-events:none;
  transform-origin:center;
  will-change:left,top,opacity,transform;
}
.drone-flight img{
  width:88px;height:88px;object-fit:contain;display:block;
  filter:drop-shadow(0 4px 14px rgba(34,211,238,0.4)) drop-shadow(0 0 12px rgba(167,139,250,0.45));
}
/* JOHOR-COMMERCIAL 专用：robotField 静态 drone 同款样式（深色投影），放大 1.5 倍：52px → 78px */
.drone-flight.uav-static img{
  width:78px;height:78px;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,0.55));
}

/* ------ walking robot in img2 plant view ------ */
.plant-robot{
  position:absolute;z-index:4;pointer-events:none;
  transform:translate(-50%,-100%);
  will-change:left,top,opacity;
  transition:opacity .4s ease;
}
.plant-robot.flip .pr-sprite{transform:scaleX(-1)}
.pr-sprite{
  position:relative;display:block;
  filter:drop-shadow(0 0 8px rgba(34,211,238,0.45)) drop-shadow(0 4px 10px rgba(0,0,0,0.55));
}
.pr-sprite img{
  width:70px;height:auto;display:block;
  /* idle gentle bob */
  animation:robot-idle 1.4s ease-in-out infinite;
}
/* when walking, use a faster gait with subtle tilt — fakes sprite-frame walking */
.plant-robot.walking .pr-sprite img{
  animation:robot-walk 0.38s steps(2, end) infinite;
}
@keyframes robot-idle{
  0%,100%{transform:translateY(0)}
  50%    {transform:translateY(-2px)}
}
@keyframes robot-walk{
  0%   {transform:translateY(0)      scaleY(1)    rotate(-2deg);}
  25%  {transform:translateY(-4px)   scaleY(1.02) rotate(0deg);}
  50%  {transform:translateY(0)      scaleY(1)    rotate(2deg);}
  75%  {transform:translateY(-4px)   scaleY(1.02) rotate(0deg);}
  100% {transform:translateY(0)      scaleY(1)    rotate(-2deg);}
}
/* shadow on the ground */
.pr-shadow{
  position:absolute;left:50%;bottom:-4px;
  width:54px;height:9px;
  background:radial-gradient(ellipse, rgba(0,0,0,0.55), transparent 70%);
  transform:translateX(-50%);
  animation:robot-shadow 0.38s ease-in-out infinite;
}
.plant-robot.walking .pr-shadow{animation:robot-shadow-walk 0.38s ease-in-out infinite}
@keyframes robot-shadow{
  0%,100%{transform:translateX(-50%) scale(1, 1);opacity:0.7}
  50%    {transform:translateX(-50%) scale(0.94, 0.92);opacity:0.55}
}
@keyframes robot-shadow-walk{
  0%,100%{transform:translateX(-50%) scale(1, 1);opacity:0.65}
  50%    {transform:translateX(-50%) scale(0.88, 0.85);opacity:0.4}
}
/* soft glow ring under robot */
.pr-glow{
  position:absolute;left:50%;bottom:-2px;
  width:44px;height:14px;
  background:radial-gradient(ellipse, rgba(34,211,238,0.35), transparent 70%);
  transform:translateX(-50%);
  filter:blur(2px);
  animation:robot-glow 1.8s ease-in-out infinite;
}
@keyframes robot-glow{
  0%,100%{opacity:0.6}
  50%    {opacity:0.95}
}

/* ── Dispatched Robots (command-mode walkers + execution bubble) ────── */
.dispatched-robots-layer{
  position:absolute;inset:0;pointer-events:none;z-index:6;
}
.plant-robot.dispatched .pr-glow{
  background:radial-gradient(ellipse, rgba(167,139,250,0.45), transparent 70%);
}
.pr-bubble{
  position:absolute;
  left:50%;bottom:calc(100% + 4px);
  transform:translateX(-50%);
  min-width:160px;max-width:260px;
  padding:7px 10px 8px;
  background:rgba(6,12,24,0.92);
  border:1px solid var(--violet);
  box-shadow:0 0 14px rgba(167,139,250,0.55), 0 6px 14px rgba(0,0,0,0.55);
  color:#e8f6fb;
  z-index:9;
  pointer-events:none;
  animation:pr-bubble-in 0.32s ease-out both;
  white-space:normal;
}
.pr-bubble::after{
  content:"";position:absolute;left:50%;top:100%;
  transform:translateX(-50%);
  width:0;height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:7px solid var(--violet);
}
.pr-bubble-head{ display:flex;align-items:center;gap:6px;margin-bottom:3px; }
.pr-bubble-code{
  font:700 9px var(--font-mono);letter-spacing:.12em;color:var(--violet);
}
.pr-bubble-tag{
  font:600 9px var(--font-cn);letter-spacing:.06em;
  padding:1px 5px;
  background:rgba(167,139,250,0.16);color:#ddd6fe;
  border:1px solid rgba(167,139,250,0.45);
}
.pr-bubble-text{ font:500 12px/1.45 var(--font-cn);color:#dbeaf2; }
@keyframes pr-bubble-in{
  0%   { opacity:0; transform:translateX(-50%) translateY(6px) scale(0.92); }
  100% { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
}

/* ── Plant Agent Field (multi-robot static layout) ──────────────────── */
.plant-agent-field{
  position:absolute;inset:0;pointer-events:none;z-index:5;
}
.plant-agent-field .paf-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
  overflow:visible;
}
.plant-agent-field .paf-particle{
  position:absolute;
  width:6px;height:6px;border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:5;
}
.paf-robot,
.paf-drone{
  position:absolute;
  transform:translate(-50%,-50%);
  animation:paf-bob 3.4s ease-in-out infinite;
  transition:filter .4s ease;
}
.paf-robot{ animation-name:paf-bob; }
.paf-drone{ animation-name:paf-drone-hover; animation-duration:2.6s; }
.paf-badge{
  position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
  font:600 9px var(--font-mono);letter-spacing:0.1em;
  padding:1px 6px;border-radius:2px;
  background:rgba(6,12,24,0.85);
  border:1px solid var(--line);
  color:var(--text-dim);
  white-space:nowrap;
  transition:color .3s,border-color .3s,background .3s;
}
.paf-robot.active{
  filter:drop-shadow(0 0 10px rgba(34,211,238,0.85));
  z-index:6;
}
.paf-robot.active .paf-badge{
  color:#fff;
  border-color:var(--cyan);
  background:rgba(34,211,238,0.22);
}
.paf-badge-drone{ color:var(--amber);border-color:rgba(251,191,36,0.45); }
.paf-drone img{
  width:52px;height:52px;
  filter:drop-shadow(0 4px 6px rgba(0,0,0,0.55));
  display:block;
}
@keyframes paf-bob{
  0%,100%{ transform:translate(-50%,-50%) translateY(0); }
  50%    { transform:translate(-50%,-50%) translateY(-4px); }
}
@keyframes paf-drone-hover{
  0%,100%{ transform:translate(-50%,-50%) translateY(-3px); }
  50%    { transform:translate(-50%,-50%) translateY(3px); }
}

/* UAV serpentine inspection route over PV arrays:
   sweeps 4 columns (52→58→64→70) up/down, then returns to UAV pad (78,42), loop. */
.paf-drone-flying{
  animation: paf-drone-fly 36s linear infinite, paf-drone-hover 2.6s ease-in-out infinite;
}
@keyframes paf-drone-fly{
  0%   { left:52%; top:28%; }
  10%  { left:52%; top:56%; }
  14%  { left:58%; top:56%; }
  24%  { left:58%; top:28%; }
  28%  { left:64%; top:28%; }
  38%  { left:64%; top:56%; }
  42%  { left:70%; top:56%; }
  52%  { left:70%; top:28%; }
  60%  { left:78%; top:35%; }
  70%  { left:78%; top:42%; }
  80%  { left:78%; top:42%; }
  92%  { left:52%; top:28%; }
  100% { left:52%; top:28%; }
}

/* Active robot speech bubble — shows current scenario step text */
.paf-bubble{
  position:absolute;left:50%;bottom:calc(100% + 10px);
  transform:translateX(-50%);
  min-width:140px;max-width:240px;
  padding:7px 10px 8px;

  width:0;height:0;

  border-right:6px solid transparent;

.paf-bubble-head{
  display:flex;align-items:center;gap:6px;

}
.paf-bubble-code{
  font:700 9px var(--font-mono);letter-spacing:.12em;
  color:var(--cyan);
}

.paf-bubble-tag{

  padding:1px 5px;
  background:rgba(34,211,238,0.14);

  border:1px solid rgba(34,211,238,0.35);
}

  background:rgba(248,113,113,0.16);color:#fecaca;border-color:rgba(248,113,113,0.45);
}

  background:rgba(251,191,36,0.14);color:#fde68a;border-color:rgba(251,191,36,0.45);
}
.paf-bubble-text{
  font:500 12px/1.45 var(--font-cn);
  color:#dbeaf2;
}
@keyframes paf-bubble-in{
  0%   { opacity:0; transform:translateX(-50%) translateY(6px) scale(0.92); }
  100% { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
}

}
.ribbon b{color:var(--cyan);font-weight:600}
